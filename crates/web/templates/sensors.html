<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rusthome — Sensors</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="page-sensors">
  <div class="wrap">
    %%SECURITY_BANNER%%
    <div id="error-bar" role="alert"></div>
    <header>
      <h1>rusthome</h1>
      <span class="tagline">sensors</span>
    </header>
    <nav class="links">
      <a href="/">Dashboard</a>
      <span class="nav-current">Sensors</span>
      <a href="/system">System</a>
      <a href="/api/state">JSON state</a>
    </nav>
    <div class="toolbar">
      <button type="button" id="btn-refresh">Refresh</button>
      <label><input type="checkbox" id="auto-refresh" checked> Auto-refresh (4s)</label>
      <span id="updated-at"></span>
    </div>
    <div class="grid">
      <section class="card">
        <h2>&#x1F321;&#xFE0F; Temperatures</h2>
        <table class="data">
          <thead><tr><th>Sensor</th><th>Value</th></tr></thead>
          <tbody id="temp-body">%%TEMPERATURE_ROWS%%</tbody>
        </table>
      </section>
      <section class="card">
        <h2>&#x1F6AA; Contacts</h2>
        <table class="data">
          <thead><tr><th>Sensor</th><th>State</th></tr></thead>
          <tbody id="contact-body">%%CONTACT_ROWS%%</tbody>
        </table>
      </section>
    </div>
  </div>
  <script src="/static/sensors.js" defer></script>
</body>
</html>
